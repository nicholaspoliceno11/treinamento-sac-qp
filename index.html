<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Treinamento Quero Passagem</title>

<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<link rel="stylesheet" href="assets/app.css?v=14">

<style>

:root{
  --qp-blue:#001C3D;
  --qp-mila-blue:#0050B8;
  --qp-mila-blue-light:#0A63D6;
  --qp-yellow:#E2E600;
  --qp-light:#F5F7FA;
  --qp-white:#FFFFFF;
}

/* SIDEBAR — estilo Apple com as cores da Quero Passagem */

.sidebar{
  background:var(--qp-white)!important;
  border-right:1px solid #e8e8ed!important;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding-top:8px;
}

/* Nome do site */
.sidebar .app-name{
  margin:16px 0 10px;
}

.sidebar .app-name-link{
  color:var(--qp-blue)!important;
  font-weight:600;
  font-size:1.15rem;
  letter-spacing:-.02em;
  display:inline-block;
  padding-bottom:6px;
  border-bottom:3px solid var(--qp-yellow);
}

/* Títulos de seção */
.sidebar-nav li strong{
  color:var(--qp-blue)!important;
  font-weight:600;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.07em;
  opacity:.5;
}

/* Links */
.sidebar ul li a{
  color:#1d1d1f!important;
  font-weight:400;
  font-size:.95rem;
  border-left:3px solid transparent;
  padding-left:12px;
  transition:color .25s ease,border-color .25s ease;
}

.sidebar ul li a:hover{
  color:var(--qp-mila-blue)!important;
}

/* Item ativo */
.sidebar-nav li.active > a,
.sidebar ul li.active > a{
  color:var(--qp-blue)!important;
  font-weight:600;
  border-left:3px solid var(--qp-yellow)!important;
}

.sidebar h1{
  color:var(--qp-blue)!important;
}

/* CONTEÚDO */

.markdown-section{
  max-width:1200px;
}

.content{
  padding-top:20px;
}

/* HERO */

.hero{
  background:linear-gradient(135deg,var(--qp-blue),var(--qp-mila-blue));
  padding:40px;
  border-radius:20px;
  color:white;
  margin-bottom:30px;
}

/* MILA - AGENTE DE TREINAMENTO */

.mila-welcome{
  display:flex;
  align-items:center;
  gap:28px;
  background:linear-gradient(135deg,var(--qp-mila-blue),var(--qp-mila-blue-light));
  border-radius:20px;
  padding:22px 30px;
  margin-bottom:30px;
  box-shadow:0 10px 26px rgba(0,80,184,.28);
  border-left:8px solid var(--qp-yellow);
  flex-wrap:wrap;
}

.mila-welcome .mila-img{
  width:170px;
  height:auto;
  flex:0 0 auto;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.28));
}

.mila-speech{
  flex:1;
  min-width:230px;
  color:#fff;
}

.mila-speech strong{
  display:block;
  font-size:1.4rem;
  margin-bottom:8px;
  color:#fff;
}

.mila-speech p{
  margin:0;
  line-height:1.55;
  color:#eaf1ff;
}

/* MILA FLUTUANTE (todas as páginas) */

#mila-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:92px;
  height:92px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--qp-mila-blue),var(--qp-mila-blue-light));
  border:3px solid var(--qp-yellow);
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.32);
  z-index:9999;
  cursor:pointer;
  transition:transform .3s ease;
}

#mila-float img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:55% 12%;
}

#mila-float:hover{
  transform:scale(1.08);
}

#mila-float::after{
  content:"Mila • Agente de Treinamento";
  position:absolute;
  right:104%;
  bottom:50%;
  transform:translateY(50%);
  white-space:nowrap;
  background:var(--qp-blue);
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
}

#mila-float:hover::after{
  opacity:1;
}

.hero h1,
.hero h1 a,
.hero h1 span,
.hero h1 .anchor,
.hero h1 .anchor span{
  color:#ffffff!important;
  -webkit-text-fill-color:#ffffff!important;
  font-weight:700;
  text-shadow:0 2px 6px rgba(0,0,0,.30);
}

/* CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  display:block;
  background:white;
  border-radius:18px;
  padding:25px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  transition:.3s;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
}

a.card:hover,
.card:hover{
  transform:translateY(-5px);
  border-left:6px solid var(--qp-yellow);
}

/* PROGRESSO (classes próprias p/ não colidir com a barra de carregamento do Docsify) */

.qp-progress{
  width:100%;
  background:#e8e8ed;
  height:22px;
  border-radius:50px;
  overflow:hidden;
}

.qp-progress-bar{
  width:35%;
  height:100%;
  background:var(--qp-yellow);
}

/* ALERTAS */

blockquote{
  border-left:5px solid var(--qp-yellow)!important;
  background:#f6f6f6!important;
  border-radius:8px;
}

/* BUSCA — estilo Apple */

.search{
  border-bottom:1px solid #e8e8ed!important;
}

.search input{
  border-radius:10px!important;
  background:#f5f5f7!important;
  border:1px solid #e8e8ed!important;
  font-size:.9rem;
}

/* TABELAS */

table{
  display:table!important;
  width:100%;
}

th{
  background:var(--qp-blue);
  color:white;
}

</style>

<script>
window.QP_CONFIG = {

};
</script>

</head>

<body class="qp-portal-locked">

<div id="qp-login-overlay" class="qp-show">
  <div class="qp-login-shell">
    <div class="qp-login-hero">
      <img class="qp-login-mila" src="assets/mila.png" alt="Mila - Agente de Treinamento da Quero Passagem">
      <div class="qp-login-welcome">
        <strong>Olá! Eu sou a Mila 👋</strong>
        <p>Sua Agente de Treinamento. Vamos juntos nessa jornada de excelência!</p>
      </div>
    </div>
    <form class="qp-login-card" id="qp-login-form" autocomplete="on">
      <h2>Treinamento Quero Passagem</h2>
      <p class="qp-sub">Entre em contato com a gestão para atualizar a senha.</p>
      <label for="qp-email">E-mail</label>
      <input id="qp-email" name="email" type="email" required placeholder="seu.email@empresa.com">
      <label for="qp-senha">Senha</label>
      <input id="qp-senha" name="password" type="password" required placeholder="Sua senha">
      <button class="qp-btn qp-btn-primary" type="submit" id="qp-login-btn">Entrar</button>
      <div class="qp-login-msg" id="qp-login-msg"></div>
    </form>
  </div>
</div>

<div id="app">
Carregando Treinamento Quero Passagem...
</div>

<div id="mila-float" title="Mila - Agente de Treinamento da Quero Passagem">
  <img src="assets/mila.png" alt="Mila - Agente de Treinamento da Quero Passagem">
</div>
