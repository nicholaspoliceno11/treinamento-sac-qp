<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Treinamento Quero Passagem</title>

<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

:root{
  --qp-navy:#1A3051;
  --qp-blue:#1A3051;
  --qp-terracotta:#C06139;
  --qp-terracotta-dark:#A34E2C;
  --qp-yellow:#F5CF45;
  --qp-light:#F7F5F2;
  --qp-white:#FFFFFF;
  --qp-mila-blue:#1A3051;
  --qp-mila-blue-light:#2B4568;
}

body{
  background:var(--qp-light);
}

/* SIDEBAR */

.sidebar{
  background:var(--qp-white)!important;
  border-right:1px solid #e8e8ed!important;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding-top:8px;
}

/* Nome do site */
.sidebar .app-name{
  margin:16px 0 10px;
}

.sidebar .app-name-link{
  color:var(--qp-blue)!important;
  font-weight:600;
  font-size:1.15rem;
  letter-spacing:-.02em;
  display:inline-block;
  padding-bottom:6px;
  border-bottom:3px solid var(--qp-yellow);
}

/* Títulos de seção */
.sidebar-nav li strong{
  color:var(--qp-blue)!important;
  font-weight:600;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.07em;
  opacity:.5;
}

/* Tópicos principais do menu — ícone Quero Passagem */
.sidebar-nav > ul > li > p,
.sidebar-nav > ul > li > a{
  display:block;
  position:relative;
  font-weight:600!important;
  font-size:.95rem;
  color:var(--qp-blue)!important;
  margin:12px 0 4px;
  padding-left:24px!important;
  border-left:none!important;
}

.sidebar-nav > ul > li > p::before,
.sidebar-nav > ul > li > a::before{
  content:"";
  position:absolute;
  left:0;
  top:.15em;
  width:16px;
  height:16px;
  background:url("assets/qp-mark.png") center/contain no-repeat;
}

.sidebar-nav > ul > li > p > a{
  color:inherit!important;
  font-weight:inherit!important;
  padding-left:0!important;
  border-left:none!important;
}

/* Subitens do Docsify dentro de Página Inicial (headings do README) */
.sidebar-nav > ul > li > p > ul.app-sub-sidebar{
  display:block;
  margin:4px 0 6px;
  padding-left:0;
}

.sidebar-nav > ul > li > p > ul.app-sub-sidebar li a{
  padding-left:28px!important;
  font-weight:400!important;
  color:#1d1d1f!important;
}

.sidebar-nav > ul > li > ul{
  margin:0 0 6px;
  padding-left:0;
}

.sidebar-nav > ul > li > ul > li > a{
  padding-left:28px!important;
  font-weight:400!important;
  color:#1d1d1f!important;
}

/* Links */
.sidebar ul li a{
  color:#1d1d1f!important;
  font-weight:400;
  font-size:.95rem;
  border-left:3px solid transparent;
  padding-left:12px;
  transition:color .25s ease,border-color .25s ease;
}

.sidebar ul li a:hover{
  color:var(--qp-terracotta)!important;
}

/* Item ativo */
.sidebar-nav li.active > a,
.sidebar ul li.active > a{
  color:var(--qp-blue)!important;
  font-weight:600;
  border-left:3px solid var(--qp-yellow)!important;
}

.sidebar h1{
  color:var(--qp-blue)!important;
}

/* CONTEÚDO */

.markdown-section{
  max-width:1200px;
}

.content{
  padding-top:20px;
}

/* HERO */

.hero{
  background:linear-gradient(145deg,var(--qp-navy) 0%,var(--qp-terracotta) 100%);
  padding:36px 40px;
  border-radius:20px;
  color:white;
  margin-bottom:30px;
  border-bottom:6px solid var(--qp-yellow);
}

.hero-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:32px;
  flex-wrap:wrap;
}

.hero-content{
  flex:1 1 300px;
  min-width:0;
}

.hero-logo-wrap{
  flex:0 0 auto;
  background:var(--qp-white);
  border-radius:16px;
  padding:18px 26px;
  box-shadow:0 10px 28px rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-logo{
  width:min(240px,100%);
  height:auto;
  display:block;
}

@media (max-width:720px){
  .hero-inner{
    flex-direction:column;
    align-items:flex-start;
  }
  .hero-logo-wrap{
    align-self:center;
    width:100%;
    max-width:280px;
  }
}

/* MILA - AGENTE DE TREINAMENTO */

.mila-welcome{
  display:flex;
  align-items:center;
  gap:28px;
  background:var(--qp-white);
  border-radius:20px;
  padding:24px 32px;
  margin-bottom:30px;
  box-shadow:0 8px 24px rgba(26,48,81,.08);
  border:1px solid #e8e4df;
  border-left:6px solid var(--qp-yellow);
  flex-wrap:wrap;
}

.mila-welcome .mila-img{
  width:170px;
  height:auto;
  flex:0 0 auto;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.28));
}

.mila-speech{
  flex:1;
  min-width:230px;
  color:var(--qp-navy);
}

.mila-speech strong{
  display:block;
  font-size:1.35rem;
  margin-bottom:8px;
  color:var(--qp-navy);
}

.mila-speech p{
  margin:0;
  line-height:1.55;
  color:#4a5568;
}

/* MILA FLUTUANTE (todas as páginas) */

#mila-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:92px;
  height:92px;
  border-radius:50%;
  background:var(--qp-white);
  border:3px solid var(--qp-yellow);
  overflow:hidden;
  box-shadow:0 8px 24px rgba(26,48,81,.25);
  z-index:9999;
  cursor:pointer;
  transition:transform .3s ease;
}

#mila-float img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:55% 12%;
}

#mila-float:hover{
  transform:scale(1.08);
}

#mila-float::after{
  content:"Mila • Agente de Treinamento";
  position:absolute;
  right:104%;
  bottom:50%;
  transform:translateY(50%);
  white-space:nowrap;
  background:var(--qp-navy);
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
}

#mila-float:hover::after{
  opacity:1;
}

.hero h1,
.hero h1 a,
.hero h1 span,
.hero h1 .anchor,
.hero h1 .anchor span{
  color:#ffffff!important;
  -webkit-text-fill-color:#ffffff!important;
  font-weight:700;
  text-shadow:0 2px 6px rgba(0,0,0,.30);
}

/* CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  display:block;
  background:white;
  border-radius:18px;
  padding:25px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  transition:.3s;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
}

a.card:hover,
.card:hover{
  transform:translateY(-4px);
  border-left:6px solid var(--qp-terracotta);
  box-shadow:0 12px 28px rgba(26,48,81,.12);
}

.card h3{
  color:var(--qp-navy);
  font-size:1.05rem;
  margin:0 0 8px;
}

/* PROGRESSO (classes próprias p/ não colidir com a barra de carregamento do Docsify) */

.qp-progress{
  width:100%;
  background:#e8e8ed;
  height:22px;
  border-radius:50px;
  overflow:hidden;
}

.qp-progress-bar{
  width:35%;
  height:100%;
  background:var(--qp-yellow);
}

/* ALERTAS */

blockquote{
  border-left:5px solid var(--qp-yellow)!important;
  background:#f6f6f6!important;
  border-radius:8px;
}

/* BUSCA — estilo Apple */

.search{
  border-bottom:1px solid #e8e8ed!important;
}

.search input{
  border-radius:10px!important;
  background:#f5f5f7!important;
  border:1px solid #e8e8ed!important;
  font-size:.9rem;
}

/* TABELAS */

table{
  display:table!important;
  width:100%;
}

th{
  background:var(--qp-navy);
  color:white;
}

</style>

<script>

};
</script>

</head>

</div>
